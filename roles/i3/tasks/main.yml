---
- name: I3
  tags:
    - i3
    - i3wm
  block:
    - name: Install
      ansible.builtin.dnf:
        name:
          - i3
          - i3status
          - i3lock
          - i3blocks
          - python3-i3ipc.noarch
        state: present
      become: true

    - name: Symlink config
      ansible.builtin.file:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        state: link
      loop:
        - src: "{{ role_path }}/files/i3"
          dest: "{{ ansible_facts['user_dir'] }}/.config/i3"
        - src: "{{ role_path }}/files/i3status"
          dest: "{{ ansible_facts['user_dir'] }}/.config/i3status"

    - name: Reload i3
      ansible.builtin.command: i3-msg reload
      ignore_errors: true
