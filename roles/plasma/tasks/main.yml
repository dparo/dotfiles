---
- name: KDE Plasma
  tags:
    - plasma
    - kde
    - never
  block:
    - name: Install
      ansible.builtin.dnf:
        name:
          - plasma-desktop
          # - yakuake
          - bibata-cursor-theme # Nicer cursor theme (Terra repository)
          # - klassy # Better theme (Terra Repository)
        state: present
      become: true

      # TODO: REmove
      # akonadi-calendar
      # akonadi-contacts
      # akonadi-import-wizard
      # akonadi-mime
      # akonadi-search
      # akonadi-server
      # akonadi-server-mysql
      # PackageKit
      # PackageKit-command-not-found
      # plasma-discover
      # plasma-discover-flatpak
      # plasma-discover-kns
      # plasma-discover-libs
      # plasma-discover-notifier
      # plasma-discover-offline-updates
      # kdeconnect
      # kdeconnectd

    - name: Symlink config
      ansible.builtin.file:
        src: "{{ role_path }}/files/config/{{item}}"
        dest: "{{ ansible_facts['user_dir'] }}/.config/{{item}}"
        state: link
      loop:
        - kdeglobals
        - kwinrc
        - kwinrulesrc
        - plasmarc
        - plasma-org.kde.plasma.desktop-appletsrc
        - kscreenlockerrc
        - kcminputrc
        - kxkbrc
        - kglobalshortcutsrc
        - plasmakeyboardrc
