---
- name: KDE Plasma
  tags:
    - plasma
    - kde
  block:

        # TODO: Isntall
        # - yakuake
        # - bibata-cursor-theme # Nicer cursor theme (Terra repository)
        # - klassy # Better theme (Terra Repository)

    - name: Symlink config
      ansible.builtin.file:
        src: "{{ role_path }}/files/config/{{item}}"
        dest: "{{ ansible_facts['user_dir'] }}/.config/{{item}}"
        state: link
      loop:
        - kdeglobals
        - kwinrc
        - kwinrulesrc
        - plasmarc
        - plasma-org.kde.plasma.desktop-appletsrc
        - kscreenlockerrc
        - kcminputrc
        - kxkbrc
        - kglobalshortcutsrc
