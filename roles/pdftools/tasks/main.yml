---

- name: Pdf Tools
  tags:
    - pdftools
    - pdf-tools
  block:
    - name: Install
      ansible.builtin.dnf:
        name:
          - pdfgrep
          - tesseract
          - tesseract-langpack-ita
          - ocrmypdf
          - pdf2svg
          - weasyprint # Utility to render HTML and CSS to PDF
        state: present
      become: true
