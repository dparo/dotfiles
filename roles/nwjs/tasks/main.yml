---
- name: NW.js
  tags:
    - nwjs
  block:
    - name: Download and unpack NW.js {{ nwjs_version }}
      ansible.builtin.unarchive:
        src: https://dl.nwjs.io/v{{ nwjs_version }}/nwjs-sdk-v{{ nwjs_version }}-linux-x64.tar.gz
        dest: "{{ ansible_facts['user_dir'] }}/opt"
        remote_src: true

    - name: Symlink binaries
      ansible.builtin.file:
        src: "{{ ansible_facts['user_dir'] }}/opt/nwjs-sdk-v{{ nwjs_version }}-linux-x64/{{ item }}"
        dest: "{{ ansible_facts['user_dir'] }}/.local/bin/{{ item }}"
        state: link
      loop:
        - nw
        - nwjc
